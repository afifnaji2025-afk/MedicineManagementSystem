<!DOCTYPE html>
<html>
<head>
    <title>Buyer Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #17a2b8; font-family: 'Segoe UI', sans-serif; }
        .login-title { text-align: center; color: white; font-size: 40px; font-weight: 600; margin-top: 50px; margin-bottom: 30px; }
        .login-card { background: #f2f2f2; border-radius: 8px; padding: 35px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .form-control { border: none; border-bottom: 2px solid #ccc; border-radius: 0; background: transparent; }
        .form-control:focus { box-shadow: none; border-bottom: 2px solid #28a745; }
        .signup-btn { background: #28a745; border: none; padding: 10px; font-weight: 600; }
        .signup-btn:hover { background: #218838; }
        .back-link { text-align: center; margin-top: 15px; }
        .back-link a { color: white; text-decoration: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="login-title">Create Account</div>
    <div class="row justify-content-center">
        <div class="col-lg-4">
            <div class="login-card">
                <h4 class="text-center mb-4"><i class="fas fa-user-plus"></i> Sign Up</h4>
                {% if error %}
                    <div class="alert alert-danger text-center">{{ error }}</div>
                {% endif %}
                {% if success %}
                    <div class="alert alert-success text-center">{{ success }}</div>
                {% endif %}
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label"><i class="fas fa-user"></i> Username</label>
                        <input type="text" name="username" class="form-control" placeholder="Choose username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label"><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" name="email" class="form-control" placeholder="Enter email" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label"><i class="fas fa-phone"></i> Phone</label>
                        <input type="text" name="phone" class="form-control" placeholder="Enter phone number">
                    </div>
                    <div class="mb-3">
                        <label class="form-label"><i class="fas fa-lock"></i> Password</label>
                        <input type="password" name="password1" class="form-control" placeholder="Enter password" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label"><i class="fas fa-lock"></i> Confirm Password</label>
                        <input type="password" name="password2" class="form-control" placeholder="Confirm password" required>
                    </div>
                    <button type="submit" class="btn signup-btn w-100 text-white">CREATE ACCOUNT</button>
                </form>
            </div>
            <div class="back-link mt-3">
                <a href="/buyer-login/"><i class="fas fa-arrow-left"></i> Already have an account? Sign in</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
