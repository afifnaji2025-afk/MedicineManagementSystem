<!DOCTYPE html>
<html>
<head>
    <title>Buyer Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <h2>Welcome, {{ request.user.username }} 👋</h2>
    <p class="text-muted">Buyer Dashboard</p>
    <div class="row g-3 mt-3">
        <div class="col-md-4"><div class="card text-center p-3"><i class="fas fa-search fa-2x text-info"></i><p class="mt-2">Search Medicines</p></div></div>
        <div class="col-md-4"><div class="card text-center p-3"><i class="fas fa-list fa-2x text-success"></i><p class="mt-2">Medicine List & Prices</p></div></div>
        <div class="col-md-4"><div class="card text-center p-3"><i class="fas fa-history fa-2x text-warning"></i><p class="mt-2">My Order History</p></div></div>
    </div>
    <a href="/logout/" class="btn btn-danger mt-4">Logout</a>
</div>
</body>
</html>
