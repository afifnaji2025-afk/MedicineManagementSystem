{% extends 'admin_base.html' %}
{% load static %}

{% block content %}

<div class="container">
    <h3 class="mb-3">
        <i class="fas fa-edit text-primary"></i> Edit Supplier
    </h3>

    {% if messages %}
        {% for m in messages %}
            <div class="alert alert-{% if m.tags == 'error' %}danger{% else %}{{ m.tags }}{% endif %} alert-dismissible fade show" role="alert">
                {{ m }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        {% endfor %}
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <!-- Supplier Name -->
        <div class="mb-3">
            <label for="supplier_name" class="form-label">Supplier Name</label>
            <input type="text" 
                   class="form-control" 
                   id="supplier_name" 
                   name="supplier_name" 
                   required 
                   placeholder="Enter supplier name"
                   value="{{ supplier.supplier_name }}">
        </div>

        <!-- Company Name -->
        <div class="mb-3">
            <label for="company_name" class="form-label">Company Name</label>
            <input type="text" 
                   class="form-control" 
                   id="company_name" 
                   name="company_name" 
                   required 
                   placeholder="Enter company name"
                   value="{{ supplier.company_name }}">
        </div>

        <!-- Phone -->
        <div class="mb-3">
            <label for="phone" class="form-label">Phone</label>
            <input type="text" 
                   class="form-control" 
                   id="phone" 
                   name="phone" 
                   required 
                   placeholder="Enter phone number"
                   value="{{ supplier.phone }}">
        </div>

        <!-- Email -->
        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" 
                   class="form-control" 
                   id="email" 
                   name="email" 
                   required 
                   placeholder="Enter email"
                   value="{{ supplier.email }}">
        </div>

        <!-- Address -->
        <div class="mb-3">
            <label for="address" class="form-label">Address</label>
            <textarea class="form-control" 
                      id="address" 
                      name="address" 
                      rows="3" 
                      required 
                      placeholder="Enter address">{{ supplier.address }}</textarea>
        </div>

        <button type="submit" class="btn btn-success w-100 py-1 fs-7">
            Update Supplier
        </button>

    </form>
</div>

{% endblock %}
