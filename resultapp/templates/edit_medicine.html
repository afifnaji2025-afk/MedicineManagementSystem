{% extends 'admin_base.html' %}
{% load static %}

{% block content %}

<div class="container">

    <h3 class="text-center mb-4">
        <i class="fas fa-capsules me-2"></i> Edit Medicine
    </h3>

    {% if messages %}
        {% for m in messages %}
            <div class="alert alert-{% if m.tags == 'error' %}danger{% else %}{{ m.tags }}{% endif %} alert-dismissible fade show">
                {{ m }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <div class="card mb-4 shadow-sm">
            <div class="card-header bg-primary text-white">
                Medicine Information
            </div>

            <div class="card-body">

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Medicine Name</label>
                        <input type="text" name="medicine_name"value="{{ medicine.medicine_name }}"class="form-control" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Company Name</label>
                        <input type="text" name="company_name"value="{{ medicine.company_name }}"class="form-control" required>
                    </div>

                </div>

                
                {% if medicine.is_active != None %}
                <div class="form-check mt-2">
                    <input type="checkbox"
                           name="is_active"
                           class="form-check-input"
                           {% if medicine.is_active %}checked{% endif %}>
                    <label class="form-check-label">
                        Active
                    </label>
                </div>
                {% endif %}

            </div>
        </div>

        <button type="submit" class="btn btn-success w-100">
            <i class="fas fa-save me-2"></i> Update Medicine
        </button>

    </form>

</div>

{% endblock %}
