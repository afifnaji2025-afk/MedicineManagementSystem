{% extends 'admin_base.html' %}
{% load static %}

{% block content %}

<div class="container mt-4">

    <h3 class="mb-3">
        <i class="fas fa-edit text-primary"></i>
        Edit Batch
    </h3>

    <!-- Messages -->
    {% if messages %}
        {% for m in messages %}
            <div class="alert alert-{% if m.tags == 'error' %}danger{% else %}{{ m.tags }}{% endif %} alert-dismissible fade show">
                {{ m }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    {% endif %}

    <div class="card shadow p-4">

        <form method="POST">
            {% csrf_token %}

            <div class="row">

                <!-- Medicine Name (Read Only) -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Medicine</label>
                    <input type="text" class="form-control"
                           value="{{ batch.medicine.medicine_name }}"
                           readonly>
                </div>

                <!-- Batch No -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Batch No</label>
                    <input type="text" name="batch_no" class="form-control"
                           value="{{ batch.batch_no }}" required>
                </div>

                <!-- Quantity -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Quantity</label>
                    <input type="number" name="quantity" class="form-control"
                           value="{{ batch.quantity }}" required>
                </div>

                <!-- Buy Price -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Buy Price</label>
                    <input type="number" step="0.01" name="buy_price" class="form-control"
                           value="{{ batch.buy_price }}" required>
                </div>

                <!-- Sell Price -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Sell Price</label>
                    <input type="number" step="0.01" name="sell_price" class="form-control"
                           value="{{ batch.sell_price }}" required>
                </div>

                <!-- Manufacture Date -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Manufacture Date</label>
                    <input type="date" name="manufacture_date" class="form-control"
                           value="{{ batch.manufacture_date|date:'Y-m-d' }}">
                </div>

                <!-- Expiry Date -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Expiry Date</label>
                    <input type="date" name="expiry_date" class="form-control"
                           value="{{ batch.expiry_date|date:'Y-m-d' }}">
                </div>

                <!-- Status -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Status</label>
                    <select name="status" class="form-control">

                        <option value="1" {% if batch.status %}selected{% endif %}>
                            Active
                        </option>

                        <option value="0" {% if not batch.status %}selected{% endif %}>
                            Inactive
                        </option>

                    </select>
                </div>

            </div>

            <!-- Buttons -->
            <div class="mt-3">

                <button type="submit" class="btn btn-success">
                    <i class="fas fa-save"></i> Update Batch
                </button>

                <a href="{% url 'batch_list' %}" class="btn btn-secondary">
                    Cancel
                </a>

            </div>

        </form>

    </div>

</div>

{% endblock %}
