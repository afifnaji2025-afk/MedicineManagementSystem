{% extends 'admin_base.html' %}
{% block content %}

<div class="container-fluid mt-2">
    <div class="card shadow-sm border-0">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h4 class="mb-0"><i class="fas fa-file-invoice-dollar me-2"></i> Invoice Settings</h4>
        </div>
        
        <div class="card-body">
            <form method="POST">
                {% csrf_token %}

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label font-weight-bold">Invoice Prefix</label>
                        <input type="text" name="invoice_prefix" class="form-control" 
                               placeholder="e.g. INV-" value="{{ invoice_set.prefix }}">
                        <small class="text-muted">Example: INV-1001</small>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label font-weight-bold">Default Printer Paper Size</label>
                        <select name="paper_size" class="form-select">
                            <option value="80mm" {% if invoice_set.paper_size == '80mm' %}selected{% endif %}>POS Thermal (80mm)</option>
                            <option value="58mm" {% if invoice_set.paper_size == '58mm' %}selected{% endif %}>POS Thermal (58mm)</option>
                            <option value="A4" {% if invoice_set.paper_size == 'A4' %}selected{% endif %}>Standard A4</option>
                        </select>
                    </div>

                    <div class="col-md-12 mb-3">
                        <label class="form-label font-weight-bold">Terms & Conditions</label>
                        <textarea name="terms_conditions" class="form-control" rows="3" 
                                  placeholder="e.g. Goods once sold are not returnable.">{{ invoice_set.terms_conditions }}</textarea>
                    </div>

                    <div class="col-md-12 mb-3">
                        <label class="form-label font-weight-bold">Footer Note (Greetings)</label>
                        <textarea name="footer_note" class="form-control" rows="2" 
                                  placeholder="e.g. Thank you for your business!">{{ invoice_set.footer_note }}</textarea>
                    </div>
                    
                    <div class="col-md-12 mb-3">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" name="show_discount" id="showDiscount" 
                                   {% if invoice_set.show_discount %}checked{% endif %}>
                            <label class="form-check-label" for="showDiscount">
                                Show Discount amount on printed invoice
                            </label>
                        </div>
                    </div>

                </div>

                <hr>
                <div class="d-flex justify-content-end">
                    <button type="submit" class="btn btn-primary px-4">
                        <i class="fas fa-save me-1"></i> Save Changes
                    </button>
                </div>

            </form>
        </div>
    </div>
</div>

{% endblock %}
