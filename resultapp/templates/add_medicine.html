{% extends 'admin_base.html' %}
{% load static %}

{% block content %}

<div class="container">

    <h3 class="text-center mb-4">
        <i class="fas fa-capsules me-2 text-black"></i> Add Medicine with Batch
    </h3>

    {% if messages %}
        {% for m in messages %}
            <div class="alert alert-{% if m.tags == 'error' %}danger{% else %}{{ m.tags }}{% endif %} alert-dismissible fade show">
                {{ m }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    {% endif %}

    <form method="post">
        {% csrf_token %}

        
        <div class="card mb-4 shadow-sm">
            <div class="card-header bg-primary text-white">
                Medicine Information
            </div>
            <div class="card-body">

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Medicine Name</label>
                        <input type="text" name="medicine_name" class="form-control" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Company Name</label>
                        <input type="text" name="company_name" class="form-control" required>
                    </div>

                </div>

            </div>
        </div>

       

        <div class="card mb-4 shadow-sm">
            <div class="card-header bg-success text-white">
                Batch Information
            </div>
            <div class="card-body">

                <div class="row">

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Batch No</label>
                        <input type="text" name="batch_no" class="form-control" required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Manufacture Date</label>
                        <input type="date" name="manufacture_date" class="form-control" required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Expiry Date</label>
                        <input type="date" name="expiry_date" class="form-control" required>
                    </div>

                </div>

                <div class="row">

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Buy Price</label>
                        <input type="number" step="0.01" name="buy_price" class="form-control" required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Sell Price</label>
                        <input type="number" step="0.01" name="sell_price" class="form-control" required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Quantity</label>
                        <input type="number" name="quantity" class="form-control" required>
                    </div>

                </div>

            </div>
        </div>

        <button type="submit" class="btn btn-success w-100">
            <i class="fas fa-save me-2"></i> Save Medicine & Batch
        </button>

    </form>

</div>

{% endblock %}
