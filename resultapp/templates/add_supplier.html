{% extends 'admin_base.html' %}
{% load static %}

{% block content %}

<div class="container mt-3">
    <h3 class="mb-4">
        <i class="fas fa-truck text-primary me-2"></i> Add Supplier
    </h3>

    {% if messages %}
        {% for m in messages %}
            <div class="alert alert-{% if m.tags == 'error' %}danger{% else %}{{ m.tags }}{% endif %} alert-dismissible fade show">
                {{ m }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    {% endif %}

    <div class="card shadow-sm">
        <div class="card-body">

            <form method="post">
                {% csrf_token %}

                <!-- Supplier Name -->
                <div class="mb-3">
                    <label class="form-label">Supplier Name *</label>
                    <input type="text" class="form-control" name="supplier_name" required>
                </div>

                <!-- Company Name -->
                <div class="mb-3">
                    <label class="form-label">Company Name *</label>
                    <input type="text" class="form-control" name="company_name" required>
                </div>

                <!-- Phone -->
                <div class="mb-3">
                    <label class="form-label">Phone *</label>
                    <input type="text" class="form-control" name="phone" required>
                </div>

                <!-- Email -->
                <div class="mb-3">
                    <label class="form-label">Email (Optional)</label>
                    <input type="email" class="form-control" name="email">
                </div>

                <!-- Address -->
                <div class="mb-3">
                    <label class="form-label">Address *</label>
                    <textarea class="form-control" name="address" rows="3" required></textarea>
                </div>

                <!-- Status -->
                <div class="mb-3">
                    <label class="form-label">Status</label>
                    <select class="form-select" name="status">
                        <option value="Active" selected>Active</option>
                        <option value="Inactive">Inactive</option>
                    </select>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success">
                        <i class="fas fa-save me-1"></i> Save Supplier
                    </button>
                    <a href="{% url 'manage_supplier' %}" class="btn btn-secondary">
                        Cancel
                    </a>
                </div>

            </form>

        </div>
    </div>
</div>

{% endblock %}
