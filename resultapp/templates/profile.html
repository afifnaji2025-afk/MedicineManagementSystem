<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <input type="text" name="pharmacy_name" value="{{ profile.pharmacy_name }}" placeholder="Pharmacy Name"><br>

    <input type="text" name="owner_name" value="{{ profile.owner_name }}" placeholder="Owner Name"><br>

    <input type="text" name="phone" value="{{ profile.phone }}" placeholder="Phone"><br>

    <input type="email" name="email" value="{{ profile.email }}" placeholder="Email"><br>

    <textarea name="address">{{ profile.address }}</textarea><br>

    {% if profile.logo %}
        <img src="{{ profile.logo.url }}" width="100">
    {% endif %}

    <input type="file" name="logo"><br>

    <button type="submit">Save</button>
</form>
