<!DOCTYPE html>

<html>

<head>
    <title>Pharmacy Management System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            background: linear-gradient(135deg, #17a2b8, #007bff);
            font-family: 'Segoe UI', sans-serif;
        }

        .page-title {
            text-align: center;
            color: white;
            font-size: 42px;
            font-weight: 700;
            margin-top: 80px;
            margin-bottom: 50px;
        }

        .role-card {
            background: #fff;
            border-radius: 15px;
            padding: 40px 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
            transition: 0.3s;
            text-decoration: none;
            display: block;
        }

        .role-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .role-icon {
            font-size: 55px;
            margin-bottom: 15px;
        }

        .role-title {
            font-size: 22px;
            font-weight: bold;
            color: #333;
        }

        .role-desc {
            font-size: 14px;
            color: #666;
            margin-top: 8px;
        }

        .admin-icon {
            color: #e91e63;
        }

        .staff-icon {
            color: #17a2b8;
        }

        .customer-icon {
            color: #28a745;
        }

        .footer {
            text-align: center;
            color: white;
            margin-top: 60px;
            font-size: 14px;
        }
    </style>
  

</head>

<body>

    <div class="container">

    
        <!-- Title -->
        <div class="page-title">
            Pharmacy <br> Management System
        </div>

        <!-- Role Cards -->
        <div class="row justify-content-center g-4">

            <!-- Admin -->
            <div class="col-lg-3 col-md-4 col-sm-6">
                <a href="{% url 'admin-login' %}" class="role-card">
                    <div class="role-icon admin-icon">
                        <i class="fas fa-user-shield"></i>
                    </div>
                    <div class="role-title">Admin</div>
                    <div class="role-desc">Full system control & management</div>
                </a>
            </div>

            <!-- Pharmacist -->
            <div class="col-lg-3 col-md-4 col-sm-6">
                <a href="{% url 'pharmacist-login' %}" class="role-card">
                    <div class="role-icon staff-icon">
                        <i class="fas fa-user-nurse"></i>
                    </div>
                    <div class="role-title">Pharmacist</div>
                    <div class="role-desc">Manage medicines & billing</div>
                </a>
            </div>

            <!-- Customer -->
            <div class="col-lg-3 col-md-4 col-sm-6">
                <a href="{% url 'customer-login' %}" class="role-card">
                    <div class="role-icon customer-icon">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="role-title">Customer</div>
                    <div class="role-desc">Browse & order medicines</div>
                </a>
            </div>

        </div>

        <!-- Footer -->
        <div class="footer">
            © 2026 Pharmacy System 
        </div>
       

    </div>

</body>

</html>
