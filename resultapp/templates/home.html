<!DOCTYPE html>
<html>
<head>
    <title>Pharmacy Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #17a2b8; font-family: 'Segoe UI', sans-serif; }
        .page-title { text-align: center; color: white; font-size: 40px; font-weight: 600; margin-top: 80px; margin-bottom: 40px; }
        .role-card { background: #f2f2f2; border-radius: 12px; padding: 35px 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); text-align: center; transition: transform 0.2s; text-decoration: none; display: block; }
        .role-card:hover { transform: translateY(-8px); box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
        .role-icon { font-size: 52px; margin-bottom: 15px; }
        .role-title { font-size: 20px; font-weight: 700; color: #333; }
        .role-desc { font-size: 13px; color: #666; margin-top: 8px; }
        .admin-icon { color: #e91e63; }
        .employee-icon { color: #17a2b8; }
        .buyer-icon { color: #28a745; }
    </style>
</head>
<body>
<div class="container">
    <div class="page-title">Pharmacy <br> Management System</div>
    <div class="row justify-content-center g-4">

        <div class="col-lg-3 col-md-4 col-sm-6">
            <a href="/admin-login/" class="role-card">
                <div class="role-icon admin-icon"><i class="fas fa-user-shield"></i></div>
                <div class="role-title">Super Admin</div>
                <div class="role-desc">Full system control & management</div>
            </a>
        </div>

        <div class="col-lg-3 col-md-4 col-sm-6">
            <a href="/employee-login/" class="role-card">
                <div class="role-icon employee-icon"><i class="fas fa-user-tie"></i></div>
                <div class="role-title">Employee</div>
                <div class="role-desc">Manage medicines, orders & inventory</div>
            </a>
        </div>

        <div class="col-lg-3 col-md-4 col-sm-6">
            <a href="/buyer-login/" class="role-card">
                <div class="role-icon buyer-icon"><i class="fas fa-user"></i></div>
                <div class="role-title">Buyer</div>
                <div class="role-desc">Browse medicines & view orders</div>
            </a>
        </div>

    </div>
</div>
</body>
</html>
