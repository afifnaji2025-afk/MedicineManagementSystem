{% extends 'admin_base.html' %}
{% load static %}
{% block content %}

<style>

.form-control, .form-select{
border:none;
border-bottom:1px solid #ccc;
border-radius:0;
box-shadow:none;
background:transparent;
}

.form-control:focus, .form-select:focus{
border-bottom:2px solid #ff3d00;
box-shadow:none;
}

label{
font-weight:500;
margin-top:15px;
}

.btn-success{
background:#2e7d32;
border:none;
}

</style>


<div class="container mt-4">

<h3 class="mb-4">
<i class="fas fa-shopping-cart"></i> New Purchase
</h3>

{% if messages %}
{% for m in messages %}
<div class="alert alert-{{ m.tags }} alert-dismissible fade show">
{{ m }}
<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>
{% endfor %}
{% endif %}

<div class="card shadow p-4">

<form method="post">
{% csrf_token %}


<label>Select Supplier</label>
<select name="supplier" class="form-select" required>
<option value="">-- Select Supplier --</option>
{% for s in suppliers %}
<option value="{{ s.id }}">
{{ s.supplier_name }} ({{ s.company_name }})
</option>
{% endfor %}
</select>


<label>Purchase Date</label>
<input type="date" name="purchase_date" class="form-control" value="{{ today }}" required>


<label>Select Medicine</label>
<select name="medicine" class="form-select" required>
<option value="">-- Select Medicine --</option>
{% for m in medicines %}
<option value="{{ m.id }}">
{{ m.medicine_name }} ({{ m.company_name }})
</option>
{% endfor %}
</select>


<label>Buy Price</label>
<input type="number" step="0.01" min="0" name="buy_price" class="form-control" required>


<label>Sell Price</label>
<input type="number" step="0.01" min="0" name="sell_price" class="form-control" required>


<label>Batch No</label>
<input type="text" name="batch_no" class="form-control" required>


<label>Mfg Date</label>
<input type="date" name="manufacture_date" class="form-control">


<label>Expiry Date</label>
<input type="date" name="expiry_date" class="form-control" required>


<label>Quantity</label>
<input type="number" name="quantity" class="form-control" min="1" required>


<button type="submit" class="btn btn-success w-100 mt-4 py-2">
<i class="fas fa-cart-plus"></i> Save Purchase
</button>

</form>

</div>

</div>

{% endblock %}
